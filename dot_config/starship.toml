command_timeout = 1500

# ── Layout ──────────────────────────────────────────────
# Línea 1: info context (OS, dir, git, runtimes) + fill + time/duration a la derecha
# Línea 2: status (solo error) + character prompt
# right_format se usa para time via fill (más portable que right_format de shell)
format = """
[░▒▓](#a3aed2)\
[  ](bg:#a3aed2 fg:#090c0c)\
[](bg:#769ff0 fg:#a3aed2)\
$directory\
[](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[](fg:#394260 bg:#212736)\
$package\
$bun\
$nodejs\
$python\
$rust\
$golang\
$direnv\
[](fg:#212736 bg:#1d2230)\
$fill\
$cmd_duration\
$time\
[ ](fg:#1d2230)\
\
\n$status$character"""

# ── OS ───────────────────────────────────────────────────
# OS se muestra inline en el format como badge fijo (Fedora)
# Si cambiaras de OS, actualizá el icono en format arriba
[os]
disabled = true

# ── Directory ────────────────────────────────────────────
[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

# ── Git ──────────────────────────────────────────────────
[git_branch]
symbol = ""
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind)](fg:#769ff0 bg:#394260)]($style)'

# ── direnv ───────────────────────────────────────────────
[direnv]
disabled = false
style = "bg:#394260"
format = '[[$symbol$loaded/$unloaded](fg:#769ff0 bg:#394260)]($style)'

# ── Package ──────────────────────────────────────────────
[package]
symbol = "󰏗 "
style = "bg:#212736"
format = '[[ $symbol($version) ](fg:#769ff0 bg:#212736)]($style)'

# ── Runtimes ─────────────────────────────────────────────
[bun]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol($version) ](fg:#769ff0 bg:#212736)]($style)'

[nodejs]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol($version) ](fg:#769ff0 bg:#212736)]($style)'

[python]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol($version)(\($venv\)) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = "󱘗"
style = "bg:#212736"
format = '[[ $symbol($version) ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol($version) ](fg:#769ff0 bg:#212736)]($style)'

# ── Metadata (right-aligned via $fill) ───────────────────
[time]
disabled = false
time_format = "%R"
style = "bg:#1d2230"
format = '[[  $time ](fg:#a0a9cb bg:#1d2230)]($style)'

[cmd_duration]
min_time = 1000
style = "bg:#1d2230"
format = '[[ ⏱ $duration ](fg:#a0a9cb bg:#1d2230)]($style)'

# ── Status (solo se ve en error) ─────────────────────────
[status]
disabled = false
format = "[$symbol $status]($style)"
success_symbol = ""
success_style = ""
failure_style = "fg:#f7768e"

# ── Character ────────────────────────────────────────────
[character]
success_symbol = "[❯](fg:#769ff0)"
error_symbol = "[❯](fg:#f7768e)"
vicmd_symbol = "[❮](fg:#a3aed2)"
