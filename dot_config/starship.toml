format = """
[в–‘в–’в–“](#a3aed2)\
[ оң‘ ](bg:#a3aed2 fg:#090c0c)\
[оӮҙ](bg:#769ff0 fg:#a3aed2)\
$directory\
[оӮҙ](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[оӮҙ](fg:#394260 bg:#212736)\
$package\
$bun\
$nodejs\
$python\
$rust\
$golang\
$php\
[оӮҙ](fg:#212736 bg:#1d2230)\
$cmd_duration\
$time\
[оӮҙ ](fg:#1d2230)\
\n$character"""

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[bun]
symbol = "пҗІ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[python]
symbol = "оҳҶ"
style = "bg:#212736"
format = '[[ $symbol ($version) (\($venv\)) ](fg:#769ff0 bg:#212736)]($style)'

[package]
symbol = "рҹ“Ұ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = "оҳ§"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[time]
disabled = false
time_format = "%I:%M %p"
style = "bg:#1d2230"
format = '[[ пҗә $time ](fg:#a0a9cb bg:#1d2230)]($style)'

[cmd_duration]
min_time = 1000
format = "[ tardГі пЁҡ $duration ]($style)"
style = "fg:#a0a9cb bg:#1d2230"
