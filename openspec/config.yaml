# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: chezmoi dotfiles repo (Fish shell, Starship, Nvim config)
  Architecture: Template-based dotfile management with .fish functions and conf.d
  Testing: None (dotfile management, no test framework)
  Style: Declarative templates with .tmpl extension

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
  design:
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas

strict_tdd: false
testing:
  unit: false
  integration: false
  e2e: false
  coverage: false
  linter: false
  type_checker: false
  formatter: false